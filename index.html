<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exploring Map Viewer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to the Exploring Map Viewer</h1>
    </header>
    <main>
        <section id="map-container">
            <h2>Map Section</h2>
            <div id="map"></div> <!-- This is where the map will be rendered -->
        </section>
        <section id="info">
            <h2>Information Section</h2>
            <p>Here you can find various information about the maps you are exploring.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Exploring Map Viewer</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
